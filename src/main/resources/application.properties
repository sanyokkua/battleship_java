logging.level.ua=error
logging.level.root=info
logging.level.org.springframework.web=info
springdoc.swagger-ui.path=/swagger-ui.html
# Many SSE subscriptions (web.sse.SessionEventBroadcaster) hold long-lived connections; virtual
# threads let the servlet container handle them without a hand-sized thread pool.
spring.threads.virtual.enabled=true
