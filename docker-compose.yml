services:
  battleship:
    build:
      context: .
      dockerfile: Dockerfile
    image: battleship:0.0.1-SNAPSHOT
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/game/editions"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3
